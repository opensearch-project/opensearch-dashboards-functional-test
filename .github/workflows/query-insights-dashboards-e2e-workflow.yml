name: Query Insights Dashboards Release tests workflow in Bundled OpenSearch Dashboards
on:
  pull_request:
    branches: [ '**' ]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.filter.outputs.tests }}
    steps:
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: |
          tests:
            - 'cypress/**/query-insights-dashboards/**'
            - '.github/workflows/release-e2e-workflow-template.yml'

  tests:
    needs: changes
    if: ${{ needs.changes.outputs.tests == 'true' }}
    uses: ./.github/workflows/release-e2e-workflow-template.yml
    with:
      test-name: Query Insights Dashboards
      # Run each spec separately to prevent Cypress 9.x from leaking describe
      # blocks between specs (the runner does not fully reset suite state when
      # using --spec glob). These tests depend on short-lived cluster state
      # (query insights windows) that expires if stale suites re-execute.
      test-command: >-
        env CYPRESS_NO_COMMAND_LOG=1 yarn cypress:run-with-security --browser chromium --spec 'cypress/integration/plugins/query-insights-dashboards/1_top_queries_spec.js'
        && env CYPRESS_NO_COMMAND_LOG=1 yarn cypress:run-with-security --browser chromium --spec 'cypress/integration/plugins/query-insights-dashboards/2_query_details_spec.js'
        && env CYPRESS_NO_COMMAND_LOG=1 yarn cypress:run-with-security --browser chromium --spec 'cypress/integration/plugins/query-insights-dashboards/3_configurations_spec.js'
        && env CYPRESS_NO_COMMAND_LOG=1 yarn cypress:run-with-security --browser chromium --spec 'cypress/integration/plugins/query-insights-dashboards/4_group_details_spec.js'
